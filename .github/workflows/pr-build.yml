# =============================================================================
# PR Build Validation
# =============================================================================
# Validates that the project compiles cleanly on Windows before a pull request
# can be merged.  Triggers only when build-relevant files are touched.  Heavy
# vcpkg dependencies (Qt6, fmt, pugixml) are cached across runs so that only
# the first build pays the full compilation cost.
#
# The custom build scripts (build.sh / build.bat) are interactive — they
# prompt for build type and vcpkg usage.  We feed the answers through stdin
# via a temporary file redirect so the scripts run unmodified.
#
# NOTE: Linux build is temporarily disabled due to CI breakage.
# =============================================================================

name: PR Build Validation

on:
  pull_request:
    paths:
      - "CMakeLists.txt"
      - "src/**"
      - "resources.qrc"
      - "hellspawn.png"
      - "hellspawn.rc"

# Cancel superseded runs for the same PR to save runner minutes.
concurrency:
  group: pr-build-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# CI build metadata — picked up by CMake (via environment variables) and
# baked into the generated gitinfo.h so the About dialog can show/link to
# the exact build and commit.
# ---------------------------------------------------------------------------
env:
  CI_BUILD_ID: ${{ github.run_id }}
  COMMIT_HASH: ${{ github.sha }}

