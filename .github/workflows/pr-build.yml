  # ===========================================================================
  # Windows — MSVC / MSBuild via build.bat
  # ===========================================================================
  build-windows:
    name: Windows Build
    runs-on: windows-latest

    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\vcpkg-binary-cache

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Prepare vcpkg binary cache directory
      # -----------------------------------------------------------------------
      - name: Create vcpkg binary cache directory
        shell: bash
        run: mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      # -----------------------------------------------------------------------
      # 3. Restore vcpkg binary cache
      # -----------------------------------------------------------------------
      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\vcpkg-binary-cache
          key: vcpkg-windows-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-windows-

      # -----------------------------------------------------------------------
      # 4. Restore CMake build directory (incremental builds)
      # -----------------------------------------------------------------------
      - name: Restore CMake build cache
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-windows-${{ hashFiles('CMakeLists.txt', 'src/**') }}
          restore-keys: |
            cmake-windows-

      # -----------------------------------------------------------------------
      # 5. Add MSBuild to PATH (used by CMake's Visual Studio generator)
      # -----------------------------------------------------------------------
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # -----------------------------------------------------------------------
      # 6. Export VCPKG_ROOT so the build script can locate vcpkg
      # -----------------------------------------------------------------------
      - name: Set VCPKG_ROOT
        shell: bash
        run: echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # 7. Generate Windows icon (.ico) from the PNG shipped in the repo
      # -----------------------------------------------------------------------
      # The CMakeLists.txt conditionally embeds hellspawn.rc (which
      # references hellspawn.ico) into the executable so that Windows
      # Explorer displays the application icon.  ImageMagick is pre-
      # installed on GitHub-hosted Windows runners.
      # -----------------------------------------------------------------------
      - name: Generate hellspawn.ico from PNG
        shell: cmd
        run: magick hellspawn.png -define icon:auto-resize=256,128,64,48,32,16 hellspawn.ico

      # -----------------------------------------------------------------------
      # 8. Build — feed interactive prompts via stdin redirect
      # -----------------------------------------------------------------------
      # Writes the two answers to a temporary file and redirects it into
      # build.bat so that `set /p` reads them from stdin.
      # -----------------------------------------------------------------------
      - name: Build (build.bat — release, vcpkg)
        shell: cmd
        run: |
          (echo release& echo yes) > build_input.txt
          call build.bat < build_input.txt

      # -----------------------------------------------------------------------
      # 9. Verify binary was produced
      # -----------------------------------------------------------------------
      - name: Verify build output
        shell: cmd
        run: |
          if exist "build\Release\hellspawn.exe" (
            echo ::notice::Build succeeded — binary at build\Release\hellspawn.exe
          ) else if exist "build\hellspawn.exe" (
            echo ::notice::Build succeeded — binary at build\hellspawn.exe
          ) else (
            echo ::error::Expected binary not found in build directory
            exit /b 1
          )
